apiVersion: apps/v1

kind: Deployment

metadata:
  name: {{ .Values.appName }}-deployment

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Values.appName }}

  template:
    metadata:
      labels:
        app: {{ .Values.appName }}

    spec:
      containers:

        - name: {{ .Values.appName }}

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: Always

          ports:
            - containerPort: 8080
